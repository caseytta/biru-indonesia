<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Galeri proyek Biru Indonesia. Disaring berdasarkan aplikasi, segment produk, dan brand." />
  <link rel="icon" type="image/png" href="asset/0-index/logo-bi-v.png" />
  <title>Galeri Proyek | Biru Indonesia</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/menu.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/3-galeri.css" />
</head>
<body>

  <!-- ==============================
        NAVBAR + Megamenu
  ============================== -->
  <div id="navbar-placeholder"></div>

<!-- HEADER -->
  <section class="gal-hero" id="galTop">
    <div class="container">
      <h1>Galeri Proyek</h1>
      <p>Jelajahi proyek kami berdasarkan aplikasi, segment produk, dan brand.</p>
    </div>
  </section>

  <!-- SIDEBAR+FILTER -->
  <section class="gal-wrap">
    <div class="container gal-layout">

      <!-- Sidebar filter -->
      <aside class="gal-sidebar">
        <button class="gal-mobile-toggle" id="galMobileToggle" type="button">Filter &#9662;</button>
        <div class="gal-filters" id="galFilters"><!-- diisi gallery.js --></div>
      </aside>

      <!-- Konten -->
      <div class="gal-content">
        <div class="gal-toolbar">
          <span class="gal-count" id="galCount">&nbsp;</span>
        </div>

        <div class="gal-grid" id="galGrid"><!-- kartu diisi gallery.js --></div>

        <p class="gal-empty" id="galEmpty">Tidak ada proyek yang cocok dengan filter. Coba kurangi pilihan filter.</p>

        <nav class="gal-pager" id="galPager" aria-label="Halaman galeri"></nav>
      </div>

    </div>
  </section>

  <!-- ==============================
       FOOTER
  ============================== -->
  <div id="footer-placeholder"></div>

<script src="js/script.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/3-galeridata.js"></script>
  <script src="js/3-galeri.js"></script>
  <script>
    // toggle sidebar di mobile
    (function(){
      var t=document.getElementById('galMobileToggle'),
          s=document.querySelector('.gal-sidebar');
      if(t&&s) t.addEventListener('click',function(){ s.classList.toggle('is-open'); });
    })();
  </script>
</body>
</html>
